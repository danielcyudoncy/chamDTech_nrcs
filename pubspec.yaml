name: chamdtech_nrcs
description: "chamDTech NRCS - Cross-platform newsroom computer system. Supports Android, iOS, Windows, macOS, and Web."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_database: ^10.5.7
  firebase_storage: ^11.7.7
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_quill: ^9.4.3
  flutter_slidable: ^3.1.0
  reorderable_grid_view: ^2.2.8
  dropdown_search: ^5.0.6
  intl: ^0.20.2
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.1
  dart_rss: ^3.0.3
  marquee: ^2.2.3
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.2.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  timeago: ^3.7.0
  web: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    
dependency_overrides:
  intl: 0.20.2